name: Mod Maintenance Todo
description: 记录 mod 新增、替换、删除、更新或兼容性排查
title: "[Mod]: "
labels:
  - todo
  - modpack
body:
  - type: dropdown
    id: action
    attributes:
      label: 操作类型 / Action
      options:
        - 新增 mod / Add
        - 更新 mod / Update
        - 删除 mod / Remove
        - 替换 mod / Replace
        - 兼容性排查 / Compatibility
        - 待评估 / Evaluate
    validations:
      required: true

  - type: input
    id: mod-name
    attributes:
      label: Mod 名称 / Mod name
      placeholder: Create / Farmer's Delight / ...
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: 来源 / Source
      options:
        - Modrinth
        - CurseForge
        - GitHub Release
        - 直链 / Direct URL
        - 本地待确认 / Unknown
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: 项目链接或 ID / Project link or ID
      placeholder: https://modrinth.com/mod/... 或 CurseForge project id
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: 原因 / Reason
      description: 为什么需要这个操作？会影响玩法、性能、兼容性还是维护成本？
      placeholder: 例如：补齐 Create 物流体验；替换旧 Forge-only mod；修复服务器崩溃。
    validations:
      required: true

  - type: checkboxes
    id: baseline
    attributes:
      label: 基线确认 / Baseline
      options:
        - label: 目标版本是 Minecraft 1.21.1
        - label: 目标加载器是 NeoForge 21.1.228
        - label: 已确认 Java 21 环境要求不变
        - label: 不提交 mod jar，只提交 packwiz 描述文件

  - type: textarea
    id: acceptance
    attributes:
      label: 验收 / Acceptance
      value: |
        - [ ] 通过 `devtool.bat` 或 packwiz 元数据完成变更
        - [ ] 运行 `devtool.bat refresh` 或等效刷新
        - [ ] 本地安装/同步 mod 文件后能启动或进入目标测试点
        - [ ] `git status --short --untracked-files=all` 未出现不应提交的 jar、日志或运行产物
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 备注 / Notes
      description: 兼容性结论、替代候选、日志链接或相关 issue。
    validations:
      required: false

